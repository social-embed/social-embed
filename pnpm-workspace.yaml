packages:
  - packages/*
nodeLinker: hoisted
verifyDepsBeforeRun: false
# Supply-chain cooldown: ignore versions younger than 3 days (4320 minutes).
# pnpm's key/unit differ from npm's: pnpm reads `minimumReleaseAge` in minutes,
# npm reads `min-release-age` in days (~/.npmrc). pnpm ignores the npm key, so
# this must be set here to actually take effect. pnpm 11 defaults this to 1 day.
minimumReleaseAge: 4320
# Loose mode: when `ncu -u` pins a range whose only matches are younger than the
# cooldown, fall back to the newest available instead of failing the install.
# Explicitly setting minimumReleaseAge would otherwise force strict=true.
minimumReleaseAgeStrict: false
allowBuilds:
  esbuild: true
  sharp: true
# Pin @codemirror/view to a single version. The cooldown above otherwise lets
# pnpm re-split it (site's direct ^6.43.0 vs transitive 6.42.1), which breaks
# CodeMirror syntax highlighting: two `EditorView.decorations` facet identities
# mean highlight decorations register against a facet the live view never reads.
overrides:
  '@codemirror/view': '^6.43.0'
minimumReleaseAgeExclude:
  - '@expressive-code/core@0.44.0'
  - '@expressive-code/plugin-frames@0.44.0'
  - '@expressive-code/plugin-shiki@0.44.0'
  - '@expressive-code/plugin-text-markers@0.44.0'
  - astro-expressive-code@0.44.0
  - expressive-code@0.44.0
  - rehype-expressive-code@0.44.0
